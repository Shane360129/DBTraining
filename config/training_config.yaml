# 模型配置
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  load_in_4bit: true
  torch_dtype: "bfloat16"
  device_map: "auto"

# LoRA/DoRA 配置
lora:
  method: "dora"
  r: 32                      # 保持 32（先不增加）
  lora_alpha: 64
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.05
  bias: "none"
  use_rslora: true

# 訓練參數
training:
  output_dir: "./outputs/models/spider1-llama31-dora-v3"
  num_train_epochs: 6        # 從 8 降到 6
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 1.8e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"

  # 優化器
  optim: "paged_adamw_8bit"
  max_grad_norm: 1.0
  gradient_checkpointing: true

  # 評估與保存
  evaluation_strategy: "steps"
  eval_steps: 500           # 從 100 增加到 200（減少評估次數）
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 2       # 只保留 2 個檢查點
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"

  # 日誌
  logging_steps: 50         # 從 20 增加到 50
  logging_dir: "./outputs/logs"
  report_to: ["tensorboard"]

  # 精度
  fp16: false
  bf16: true
  seed: 42

# 資料配置
data:
  train_file: "./data/spider/train_spider.json"
  dev_file: "./data/spider/dev.json"
  tables_file: "./data/spider/tables.json"
  max_source_length: 1024
  max_target_length: 256

# Prompt 配置
prompt:
  use_cot: true